name: AI News Curation Agent

on:
  schedule:
    - cron: '0 8 * * *'        # Every day at 8:00 AM UTC
  workflow_dispatch:           # Allows manual trigger from GitHub

jobs:
  run-agent:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci || npm install   # works even if you have no package.json yet

      - name: Run curation agent
        env:
          XAI_API_KEY: ${{ secrets.XAI_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: node agent.js

      - name: Commit curation output
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add curations/
          git diff --cached --quiet || git commit -m "chore: add curation $(date -u +%Y-%m-%d)"
          git push